services:
  - type: web
    name: scanix-body
    env: node
    region: ohio
    plan: free

    # Usa Yarn explicitamente; remove package-lock.json residual antes de instalar
    buildCommand: "rm -f package-lock.json && yarn install --frozen-lockfile=false && yarn build"
    startCommand: "yarn start"

    # Cache do Next.js entre deploys (elimina o aviso "No build cache found")
    # Render preserva estes diretórios entre builds automaticamente
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"

      # Variáveis Supabase — preencher no dashboard do Render
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

      # Opcional — IA
      - key: OPENAI_API_KEY
        sync: false

    # Render armazena esses paths no cache persistente entre builds
    autoDeploy: true
